        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 12px; padding: 30px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; }
    </style>

    <main class="main-content">
        <header class="topbar"><button class="menu-toggle" onclick="toggleSidebar()">☰</button><h1>Milk Records</h1><div class="topbar-right"><a href="dashboard.html" class="back-btn">← Back</a><button class="btn btn-primary" onclick="showAddMilk()">+ Add</button></div></header>
        <div class="dashboard-content">
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="date" id="filterDate" style="padding: 10px; border: 2px solid #e5e7eb; border-radius: 8px;">
                <button class="btn btn-secondary" onclick="renderMilk()">Filter</button>
            </div>
            <div id="milkList"></div>
        </div>
    </main>
    <div class="modal" id="milkModal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Record Milk</h2>
            <form id="milkForm">
                <div class="form-group"><label>Recording Date *</label><input type="date" id="recordingDate" required></div>
                <div class="form-group"><label>Session *</label><select id="session" required><option value="Morning">Morning</option><option value="Afternoon">Afternoon</option><option value="Evening">Evening</option></select></div>
                <div class="form-group"><label>Amount (Liters) *</label><input type="number" id="amountLiters" step="0.1" required placeholder="e.g., 5.5"></div>
                <div class="form-group"><label>Notes</label><input type="text" id="milkNotes" placeholder="Any notes"></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()" style="flex:1">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="flex:1">Save</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="storage-service.js"></script>
    <script>
        document.getElementById('recordingDate').valueAsDate = new Date();

        async function renderMilk() {
            const records = await DB.getAllMilk();
            const filterDate = document.getElementById('filterDate').value;
            let filtered = records;
            if (filterDate) filtered = records.filter(m => m.recording_date === filterDate);
            filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const list = document.getElementById('milkList');
            if (filtered.length === 0) { list.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">No milk records yet.</p>'; return; }
            list.innerHTML = filtered.map(m => `<div class="record-card"><div><strong style="font-size: 18px;">${m.amount_liters || 0} L</strong><p style="margin: 5px 0 0 0; color: #666;">${m.recording_date || ''} | ${m.session || ''}</p></div><div style="display: flex; gap: 8px;"><button class="btn btn-sm btn-logout" onclick="deleteMilk('${m.id}')">Delete</button></div></div>`).join('');
        }

        function showAddMilk() { document.getElementById('milkForm').reset(); document.getElementById('recordingDate').valueAsDate = new Date(); document.getElementById('milkModal').classList.add('show'); }
        function closeModal() { document.getElementById('milkModal').classList.remove('show'); }

        document.getElementById('milkForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            await DB.createMilk({ recording_date: document.getElementById('recordingDate').value, session: document.getElementById('session').value, amount_liters: parseFloat(document.getElementById('amountLiters').value), notes: document.getElementById('milkNotes').value });
            closeModal();
            renderMilk();
        });

        async function deleteMilk(id) { if (confirm('Delete this record?')) { await DB.deleteMilk(id); renderMilk(); } }

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }

        renderMilk();
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
