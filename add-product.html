<!DOCTYPE html>
<html lang="en">
<head>

<body>

            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>

            <a href="shop.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Add Product</h1>
            <div class="topbar-right">
                <a href="shop.html" class="back-btn">← Back</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <form id="productForm">
                    <div class="form-group">
                        <label>Product Name *</label>
                        <input type="text" id="productName" required placeholder="e.g., Fresh Milk, Yogurt, Cheese">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="Milk">Milk</option>
                            <option value="Yogurt">Yogurt</option>
                            <option value="Cheese">Cheese</option>
                            <option value="Butter">Butter</option>
                            <option value="Cream">Cream</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price (UGX) *</label>
                        <input type="number" id="price" required placeholder="e.g., 3000">
                    </div>
                    <div class="form-group">
                        <label>Initial Stock *</label>
                        <input type="number" id="stockQuantity" required value="0">
                    </div>
                    <div class="form-group">
                        <label>Low Stock Threshold</label>
                        <input type="number" id="lowStockThreshold" value="10">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="2" placeholder="Product description..."></textarea>
                    </div>
                    <div class="form-actions" style="margin-top: 24px;">
                        <a href="shop.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add Product</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="storage-service.js"></script>
    <script>
        const user = DB.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('productName').value,
                category: document.getElementById('category').value,
                price: parseFloat(document.getElementById('price').value),
                stock_quantity: parseInt(document.getElementById('stockQuantity').value),
                low_stock_threshold: parseInt(document.getElementById('lowStockThreshold').value),
                description: document.getElementById('description').value
            };
            DB.create('products', data);
            window.location.href = 'shop.html';
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
</body>
</html>
</body>
</html>
