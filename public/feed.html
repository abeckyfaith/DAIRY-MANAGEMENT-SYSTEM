<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Inventory - Dairy Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>
            <a href="health.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>
            <a href="shop.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="feed.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5"/></svg>Feed</a>
            <a href="equipment.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Equipment</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Feed Inventory</h1>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <div class="card-header">
                    <h3>Add Feed Item</h3>
                </div>
                <div class="card-body">
                    <form id="feedForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Feed Name *</label>
                                <input type="text" id="feedName" required placeholder="e.g., Silage, Hay, Concentrate">
                            </div>
                            <div class="form-group">
                                <label>Quantity (kg) *</label>
                                <input type="number" id="quantity" step="0.1" required>
                            </div>
                            <div class="form-group">
                                <label>Unit Cost (UGX)</label>
                                <input type="number" id="unitCost" placeholder="Cost per kg">
                            </div>
                            <div class="form-group">
                                <label>Supplier</label>
                                <input type="text" id="supplier" placeholder="Supplier name">
                            </div>
                        </div>
                        <div class="form-actions" style="margin-top: 24px;">
                            <button type="submit" class="btn btn-primary">Add to Inventory</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card" style="margin-top: 24px;">
                <div class="card-header"><h3>Current Inventory</h3></div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>Feed Name</th><th>Quantity (kg)</th><th>Unit Cost</th><th>Total Value</th><th>Supplier</th></tr>
                            </thead>
                            <tbody id="feedTable">
                                <tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-service.js"></script>
    <script>
        AuthService.onAuthStateChange(user => {
            if (!user) window.location.href = 'index.html';
            else loadInventory();
        });

        async function loadInventory() {
            const items = await FeedService.getInventory();
            const tbody = document.getElementById('feedTable');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">No feed items in inventory</td></tr>';
            } else {
                tbody.innerHTML = items.map(i => `
                    <tr>
                        <td><strong>${i.name || 'N/A'}</strong></td>
                        <td>${i.quantity || 0}</td>
                        <td>UGX ${(i.unit_cost || 0).toLocaleString()}</td>
                        <td>UGX ${((i.quantity || 0) * (i.unit_cost || 0)).toLocaleString()}</td>
                        <td>${i.supplier || '-'}</td>
                    </tr>
                `).join('');
            }
        }

        document.getElementById('feedForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('feedName').value,
                quantity: parseFloat(document.getElementById('quantity').value),
                unit_cost: parseFloat(document.getElementById('unitCost').value) || 0,
                supplier: document.getElementById('supplier').value
            };
            await FeedService.addToInventory(data);
            document.getElementById('feedForm').reset();
            loadInventory();
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        async function handleLogout() { await AuthService.logout(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
