<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Records - Dairy Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>
            <a href="health.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>
            <a href="shop.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Milk Records</h1>
            <div class="topbar-right">
                <a href="record-milk.html" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Record Milk
                </a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="stats-grid" style="margin-bottom: 24px;">
                <div class="stat-card">
                    <div class="icon"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg></div>
                    <div class="value" id="todayTotal">0 L</div>
                    <div class="label">Today's Total</div>
                </div>
                <div class="stat-card">
                    <div class="icon" style="background: #f59e0b;"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                    <div class="value" id="monthTotal">0 L</div>
                    <div class="label">This Month</div>
                </div>
            </div>

            <div class="search-bar">
                <input type="date" id="filterDate">
                <select id="filterSession">
                    <option value="">All Sessions</option>
                    <option value="Morning">Morning</option>
                    <option value="Afternoon">Afternoon</option>
                    <option value="Evening">Evening</option>
                </select>
                <button class="btn btn-primary" onclick="filterRecords()">Filter</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Session</th>
                            <th>Amount (L)</th>
                            <th>Fat Content</th>
                            <th>Notes</th>
                        </tr>
                    </thead>
                    <tbody id="milkTable">
                        <tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="assets/js/firebase-service.js"></script>
    <script>
        let allRecords = [];
        let currentPage = 1;
        const itemsPerPage = 15;

        AuthService.onAuthStateChange(user => {
            if (!user) window.location.href = 'index.html';
            else { loadRecords(); loadStats(); }
        });

        async function loadStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayTotal = await MilkProductionService.getDailyTotal(today);
            document.getElementById('todayTotal').textContent = todayTotal.toFixed(1) + ' L';
        }

        async function loadRecords() {
            const result = await MilkProductionService.getAll(1, 100);
            allRecords = result.records;
            renderRecords();
        }

        function renderRecords() {
            const tbody = document.getElementById('milkTable');
            const totalPages = Math.ceil(allRecords.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = allRecords.slice(start, start + itemsPerPage);

            if (paginated.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">No records found</td></tr>';
            } else {
                tbody.innerHTML = paginated.map(r => `
                    <tr>
                        <td>${r.recording_date || 'N/A'}</td>
                        <td><span class="badge">${r.session || 'N/A'}</span></td>
                        <td><strong>${r.amount_liters || 0}</strong></td>
                        <td>${r.fat_content ? r.fat_content + '%' : '-'}</td>
                        <td>${r.notes || '-'}</td>
                    </tr>
                `).join('');
            }
            renderPagination(totalPages);
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            if (totalPages <= 1) { pagination.innerHTML = ''; return; }
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
            }
            pagination.innerHTML = html;
        }

        function goToPage(page) { currentPage = page; renderRecords(); }

        function filterRecords() {
            const date = document.getElementById('filterDate').value;
            const session = document.getElementById('filterSession').value;
            if (!date && !session) { loadRecords(); return; }
            MilkProductionService.getAll(1, 100).then(result => {
                allRecords = result.records.filter(r => {
                    if (date && r.recording_date !== date) return false;
                    if (session && r.session !== session) return false;
                    return true;
                });
                currentPage = 1;
                renderRecords();
            });
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        async function handleLogout() { await AuthService.logout(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
