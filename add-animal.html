<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Animal - Dairy Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
        <div class="sidebar-header">
            <svg viewBox="0 0 64 64" fill="#667eea" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="32" cy="34" rx="22" ry="20"/>
  <ellipse cx="8" cy="28" rx="6" ry="10" transform="rotate(-30 8 28)"/>
  <ellipse cx="56" cy="28" rx="6" ry="10" transform="rotate(30 56 28)"/>
  <path d="M18 18 Q14 6 22 10" stroke="#667eea" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M46 18 Q50 6 42 10" stroke="#667eea" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="24" cy="30" r="6" fill="white"/>
  <circle cx="40" cy="30" r="6" fill="white"/>
  <circle cx="25" cy="30" r="2.5" fill="#333"/>
  <circle cx="41" cy="30" r="2.5" fill="#333"/>
  <ellipse cx="32" cy="44" rx="10" ry="6" fill="#764ba2"/>
  <circle cx="29" cy="44" r="1.5" fill="#333"/>
  <circle cx="35" cy="44" r="1.5" fill="#333"/>
</svg>
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="animals.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>
            <a href="health.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>
            <a href="shop.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Add Animal</h1>
            <div class="topbar-right">
                <a href="animals.html" class="back-btn">← Back</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <form id="addAnimalForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Tag Number *</label>
                            <input type="text" id="tagNumber" required placeholder="e.g., DM-001">
                        </div>
                        <div class="form-group">
                            <label>Gender *</label>
                            <select id="gender" required>
                                <option value="">Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Breed</label>
                            <input type="text" id="breedName" placeholder="e.g., Friesian">
                        </div>
                        <div class="form-group">
                            <label>Birth Date</label>
                            <input type="date" id="birthDate">
                        </div>
                        <div class="form-group">
                            <label>Weight (kg)</label>
                            <input type="number" id="weight" step="0.1" placeholder="e.g., 350">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="status">
                                <option value="Active">Active</option>
                                <option value="Pregnant">Pregnant</option>
                                <option value="Lactating">Lactating</option>
                                <option value="Dry">Dry Period</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Notes</label>
                            <textarea id="notes" rows="3" placeholder="Any additional notes about this animal..."></textarea>
                        </div>
                    </div>
                    <div class="form-actions" style="margin-top: 24px;">
                        <a href="animals.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Add Animal</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="storage-service.js"></script>
    <script>
        const user = DB.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        document.getElementById('addAnimalForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                tag_number: document.getElementById('tagNumber').value,
                gender: document.getElementById('gender').value,
                breed_name: document.getElementById('breedName').value,
                birth_date: document.getElementById('birthDate').value,
                weight: parseFloat(document.getElementById('weight').value) || null,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            DB.create('animals', data);
            window.location.href = 'animals.html';
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
</body>
</html>
</body>
</html>
