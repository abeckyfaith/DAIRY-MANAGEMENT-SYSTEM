        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Record Sale</h1>
            <div class="topbar-right">
                <a href="shop.html" class="back-btn">← Back</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <form id="saleForm">
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="customerName" placeholder="Customer name (optional)">
                    </div>
                    <div class="form-group">
                        <label>Product *</label>
                        <select id="productId" required><option value="">Select Product</option></select>
                    </div>
                    <div class="form-group">
                        <label>Quantity *</label>
                        <input type="number" id="quantity" required min="1">
                    </div>
                    <div class="form-group">
                        <label>Unit Price (UGX)</label>
                        <input type="number" id="unitPrice" required>
                    </div>
                    <div class="form-group">
                        <label>Sale Date</label>
                        <input type="date" id="saleDate">
                    </div>
                    <div class="form-actions" style="margin-top: 24px;">
                        <a href="shop.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Complete Sale</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="storage-service.js"></script>
    <script>
        const user = DB.getCurrentUser();
        if (!user) window.location.href = 'index.html';

        function loadProducts() {
            const products = DB.getAll('products');
            const select = document.getElementById('productId');
            products.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = `${p.name} - UGX ${(p.price || 0).toLocaleString()} (Stock: ${p.stock_quantity || 0})`;
                option.dataset.price = p.price || 0;
                option.dataset.stock = p.stock_quantity || 0;
                select.appendChild(option);
            });
            document.getElementById('saleDate').valueAsDate = new Date();
        }

        document.getElementById('productId').addEventListener('change', function() {
            const option = this.options[this.selectedIndex];
            if (option.value) {
                document.getElementById('unitPrice').value = option.dataset.price;
                document.getElementById('quantity').max = option.dataset.stock;
            }
        });

        document.getElementById('saleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const quantity = parseInt(document.getElementById('quantity').value);
            const productId = document.getElementById('productId').value;
            const products = DB.getAll('products');
            const product = products.find(p => p.id === productId);
            
            if (product && quantity > (product.stock_quantity || 0)) {
                alert('Insufficient stock!');
                return;
            }

            const totalAmount = quantity * parseFloat(document.getElementById('unitPrice').value);
            
            DB.create('invoices', {
                customer_name: document.getElementById('customerName').value,
                invoice_date: document.getElementById('saleDate').value,
                total_amount: totalAmount
            });

            DB.create('income', {
                description: `Sale: ${product?.name || 'Product'} x${quantity}`,
                amount: totalAmount,
                transaction_date: document.getElementById('saleDate').value
            });

            if (product) {
                product.stock_quantity = (product.stock_quantity || 0) - quantity;
                DB.update('products', product.id, { stock_quantity: product.stock_quantity });
            }

            window.location.href = 'shop.html';
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
        loadProducts();
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
</body>
