<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sale - Dairy Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>
            <a href="health.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>
            <a href="shop.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Record Sale</h1>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <form id="saleForm">
                    <div class="form-group">
                        <label>Customer Name</label>
                        <input type="text" id="customerName" placeholder="Customer name (optional)">
                    </div>
                    <div class="form-group">
                        <label>Product *</label>
                        <select id="productId" required><option value="">Select Product</option></select>
                    </div>
                    <div class="form-group">
                        <label>Quantity *</label>
                        <input type="number" id="quantity" required min="1">
                    </div>
                    <div class="form-group">
                        <label>Unit Price (UGX)</label>
                        <input type="number" id="unitPrice" required>
                    </div>
                    <div class="form-group">
                        <label>Sale Date</label>
                        <input type="date" id="saleDate">
                    </div>
                    <div class="form-actions" style="margin-top: 24px;">
                        <a href="shop.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Complete Sale</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-service.js"></script>
    <script>
        AuthService.onAuthStateChange(user => {
            if (!user) window.location.href = 'index.html';
            else loadProducts();
        });

        async function loadProducts() {
            const products = await ProductsService.getAll();
            const select = document.getElementById('productId');
            products.forEach(p => {
                const option = document.createElement('option');
                option.value = p.id;
                option.textContent = `${p.name} - UGX ${(p.price || 0).toLocaleString()} (Stock: ${p.stock_quantity || 0})`;
                option.dataset.price = p.price || 0;
                option.dataset.stock = p.stock_quantity || 0;
                select.appendChild(option);
            });
            document.getElementById('saleDate').valueAsDate = new Date();
        }

        document.getElementById('productId').addEventListener('change', function() {
            const option = this.options[this.selectedIndex];
            if (option.value) {
                document.getElementById('unitPrice').value = option.dataset.price;
                document.getElementById('quantity').max = option.dataset.stock;
            }
        });

        document.getElementById('saleForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const quantity = parseInt(document.getElementById('quantity').value);
            const productId = document.getElementById('productId').value;
            const products = await ProductsService.getAll();
            const product = products.find(p => p.id === productId);
            
            if (product && quantity > (product.stock_quantity || 0)) {
                alert('Insufficient stock!');
                return;
            }

            const invoiceData = {
                customer_name: document.getElementById('customerName').value,
                invoice_date: document.getElementById('saleDate').value,
                total_amount: quantity * parseFloat(document.getElementById('unitPrice').value)
            };

            const items = [{
                product_id: productId,
                product_name: product?.name || 'Unknown',
                quantity: quantity,
                unit_price: parseFloat(document.getElementById('unitPrice').value)
            }];

            await InvoicesService.create(invoiceData, items);
            await FinanceService.addIncome({
                description: `Sale: ${product?.name || 'Product'} x${quantity}`,
                amount: quantity * parseFloat(document.getElementById('unitPrice').value),
                transaction_date: document.getElementById('saleDate').value
            });

            window.location.href = 'shop.html';
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        async function handleLogout() { await AuthService.logout(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
