<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproduction - Dairy Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-cow-container">
        <svg class="bg-cow bg-cow-1" viewBox="0 0 200 200" fill="#764ba2"><ellipse cx="100" cy="110" rx="60" ry="50"/><ellipse cx="40" cy="70" rx="20" ry="12" transform="rotate(-30 40 70)"/><ellipse cx="160" cy="70" rx="20" ry="12" transform="rotate(30 160 70)"/><path d="M50 60 Q35 25 55 40" stroke="#764ba2" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M150 60 Q165 25 145 40" stroke="#764ba2" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="75" cy="95" r="12" fill="rgba(102,126,234,0.5)"/><circle cx="130" cy="115" r="8" fill="rgba(102,126,234,0.5)"/><circle cx="80" cy="90" r="8" fill="#fff"/><circle cx="130" cy="90" r="8" fill="#fff"/><circle cx="82" cy="92" r="4" fill="#333"/><circle cx="132" cy="92" r="4" fill="#333"/><ellipse cx="100" cy="130" rx="24" ry="16" fill="#f8b4d9"/><circle cx="92" cy="130" r="4" fill="#764ba2"/><circle cx="108" cy="130" r="4" fill="#764ba2"/></svg>
        <svg class="bg-cow bg-cow-2" viewBox="0 0 200 200" fill="#667eea"><ellipse cx="100" cy="110" rx="60" ry="50"/><ellipse cx="40" cy="70" rx="20" ry="12" transform="rotate(-30 40 70)"/><ellipse cx="160" cy="70" rx="20" ry="12" transform="rotate(30 160 70)"/><path d="M50 60 Q35 25 55 40" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M150 60 Q165 25 145 40" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="75" cy="95" r="12" fill="rgba(118,75,162,0.5)"/><circle cx="130" cy="115" r="8" fill="rgba(118,75,162,0.5)"/><circle cx="80" cy="90" r="8" fill="#fff"/><circle cx="130" cy="90" r="8" fill="#fff"/><circle cx="82" cy="92" r="4" fill="#333"/><circle cx="132" cy="92" r="4" fill="#333"/><ellipse cx="100" cy="130" rx="24" ry="16" fill="#f8b4d9"/><circle cx="92" cy="130" r="4" fill="#667eea"/><circle cx="108" cy="130" r="4" fill="#667eea"/></svg>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
        <div class="sidebar-header">
            <img src="animal.png" alt="Logo" style="width:40px;height:40px;object-fit:contain;">
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>
            <a href="health.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>
            <a href="reproduction.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>Reproduction</a>
            <a href="shop.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Reproduction</h1>
            <div class="topbar-right">
                <a href="dashboard.html" class="back-btn">← Back</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <div class="card-header"><h3>Record Insemination</h3></div>
                    <div class="card-body">
                        <form id="inseminationForm">
                            <div class="form-group">
                                <label>Animal Tag *</label>
                                <select id="animalId" required><option value="">Select Animal</option></select>
                            </div>
                            <div class="form-group">
                                <label>Insemination Date *</label>
                                <input type="date" id="insemDate" required>
                            </div>
                            <div class="form-group">
                                <label>Bull ID</label>
                                <input type="text" id="bullId" placeholder="Sire identifier">
                            </div>
                            <div class="form-group">
                                <label>Technician</label>
                                <input type="text" id="technician" placeholder="Technician name">
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Record</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"><h3>Record Calving</h3></div>
                    <div class="card-body">
                        <form id="calvingForm">
                            <div class="form-group">
                                <label>Animal Tag *</label>
                                <select id="calvingAnimalId" required><option value="">Select Animal</option></select>
                            </div>
                            <div class="form-group">
                                <label>Calving Date *</label>
                                <input type="date" id="calvingDate" required>
                            </div>
                            <div class="form-group">
                                <label>Calf Tag</label>
                                <input type="text" id="calfTag" placeholder="Calf identifier">
                            </div>
                            <div class="form-group">
                                <label>Calf Gender</label>
                                <select id="calfGender">
                                    <option value="">Select</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Record</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="card" style="margin-top: 24px;">
                <div class="card-header"><h3>Insemination History</h3></div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Date</th><th>Animal</th><th>Bull</th><th>Technician</th></tr></thead>
                            <tbody id="insemTable"><tr><td colspan="4" style="text-align: center;">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="storage-service.js"></script>
    <script>
        function loadAnimals() {
            const animals = DB.getAll('animals');
            const selects = ['animalId', 'calvingAnimalId'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                animals.filter(a => a.gender === 'Female').forEach(a => {
                    const option = document.createElement('option');
                    option.value = a.id;
                    option.textContent = `${a.tag_number} - ${a.breed_name || 'Unknown'}`;
                    select.appendChild(option);
                });
            });
            document.getElementById('insemDate').valueAsDate = new Date();
            document.getElementById('calvingDate').valueAsDate = new Date();
        }

        function loadInseminations() {
            const records = DB.getAll('inseminations');
            const tbody = document.getElementById('insemTable');
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">No records</td></tr>';
            } else {
                tbody.innerHTML = records.reverse().map(r => `
                    <tr><td>${r.insem_date || 'N/A'}</td><td>${r.animal_id || 'N/A'}</td><td>${r.bull_id || '-'}</td><td>${r.technician || '-'}</td></tr>
                `).join('');
            }
        }

        document.getElementById('inseminationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            DB.create('inseminations', {
                animal_id: document.getElementById('animalId').value,
                insem_date: document.getElementById('insemDate').value,
                bull_id: document.getElementById('bullId').value,
                technician: document.getElementById('technician').value
            });
            loadInseminations();
            this.reset();
            document.getElementById('insemDate').valueAsDate = new Date();
        });

        document.getElementById('calvingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            DB.create('calving', {
                animal_id: document.getElementById('calvingAnimalId').value,
                calving_date: document.getElementById('calvingDate').value,
                calf_tag: document.getElementById('calfTag').value,
                calf_gender: document.getElementById('calfGender').value
            });
            this.reset();
            document.getElementById('calvingDate').valueAsDate = new Date();
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
        loadAnimals();
        loadInseminations();
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
</body>
</html>
