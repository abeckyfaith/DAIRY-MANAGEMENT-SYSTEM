    <script src="storage-service.js"></script>
    <script>
        let currentUser = null;

        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                location.href = 'index.html';
                return;
            }
            currentUser = await DB.getUserData();
            if (!currentUser) {
                location.href = 'index.html';
                return;
            }
            if (currentUser.role !== 'Admin' && currentUser.role !== 'Manager') {
                location.href = 'worker.html';
                return;
            }
            document.getElementById('userName').textContent = currentUser.full_name;
            loadDashboard();
        });

        async function loadDashboard() {
            const animals = await DB.getAllAnimals();
            const milk = await DB.getAllMilk();
            const products = await DB.getAllProducts();
            const income = await DB.getAllIncome();

            document.getElementById('totalAnimals').textContent = animals.length;
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('totalIncome').textContent = 'UGX ' + income.reduce((a, b) => a + (b.amount || 0), 0).toLocaleString();

            const today = new Date().toISOString().split('T')[0];
            const todayMilk = milk.filter(m => m.recording_date === today).reduce((a, b) => a + (b.amount_liters || 0), 0);
            document.getElementById('milkToday').textContent = todayMilk.toFixed(1) + ' L';

            const recentList = document.getElementById('recentAnimals');
            if (animals.length === 0) {
                recentList.innerHTML = '<li style="text-align: center; color: #999; padding: 20px;">No animals registered yet</li>';
            } else {
                recentList.innerHTML = animals.slice(-5).reverse().map(a => `
                    <li style="padding: 12px 0; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${a.tag_number || 'N/A'}</strong>
                            <span style="color: #666; font-size: 12px; margin-left: 10px;">${a.breed_name || ''} ${a.gender ? '- ' + a.gender : ''}</span>
                        </div>
                        <span style="color: #999; font-size: 12px;">${a.weight ? a.weight + ' kg' : ''}</span>
                    </li>
                `).join('');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('show');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>
        window.onscroll = function() { toggleScrollBtn() };
        function toggleScrollBtn() {
            document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300);
        }
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
