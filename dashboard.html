<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Dairy Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Dashboard
            </a>
            <a href="animals.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" y1="9" x2="9.01" y2="9"/>
                    <line x1="15" y1="9" x2="15.01" y2="9"/>
                </svg>
                Animals
            </a>
            <a href="milk.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M8 2h8l4 10H4L8 2z"/>
                    <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                    <line x1="8" y1="22" x2="8" y2="12"/>
                    <line x1="16" y1="22" x2="16" y2="12"/>
                </svg>
                Milk Records
            </a>
            <a href="health.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
                Health
            </a>
            <a href="shop.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Dairy Shop
            </a>
            <a href="finance.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                Finance
            </a>
            <a href="feed.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v6"/>
                    <path d="M12 22v-6"/>
                    <path d="M4.93 10.93l4.24 4.24"/>
                    <path d="M14.83 8.83l4.24-4.24"/>
                    <path d="M2 18h6"/>
                    <path d="M16 18h6"/>
                    <path d="M4.93 13.07l4.24-4.24"/>
                    <path d="M14.83 15.17l4.24 4.24"/>
                </svg>
                Feed
            </a>
            <a href="users.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                Users
            </a>
            <a href="index.html" class="nav-item" onclick="DB.logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
            </a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Dashboard</h1>
            <div class="topbar-right">
                <span id="userName">Loading...</span>
                <button class="btn btn-logout" onclick="DB.logout(); location.href='index.html'">Logout</button>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" style="width:40px;height:40px;margin-bottom:10px;">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                        <line x1="9" y1="9" x2="9.01" y2="9"/>
                        <line x1="15" y1="9" x2="15.01" y2="9"/>
                    </svg>
                    <div class="value" id="totalAnimals">0</div>
                    <div class="label">Total Animals</div>
                </div>
                <div class="stat-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" style="width:40px;height:40px;margin-bottom:10px;">
                        <path d="M8 2h8l4 10H4L8 2z"/>
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                    </svg>
                    <div class="value" id="milkToday">0 L</div>
                    <div class="label">Milk Today</div>
                </div>
                <div class="stat-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="width:40px;height:40px;margin-bottom:10px;">
                        <circle cx="9" cy="21" r="1"/>
                        <circle cx="20" cy="21" r="1"/>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                    </svg>
                    <div class="value" id="totalProducts">0</div>
                    <div class="label">Products</div>
                </div>
                <div class="stat-card">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" style="width:40px;height:40px;margin-bottom:10px;">
                        <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                        <line x1="1" y1="10" x2="23" y2="10"/>
                    </svg>
                    <div class="value" id="totalIncome">UGX 0</div>
                    <div class="label">Total Income</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Quick Actions</h3>
                </div>
                <div class="card-body">
                    <div class="quick-actions">
                        <a href="animals.html" class="quick-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="12" y1="8" x2="12" y2="16"/>
                                <line x1="8" y1="12" x2="16" y2="12"/>
                            </svg>
                            <span>Add Animal</span>
                        </a>
                        <a href="milk.html" class="quick-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M8 2h8l4 10H4L8 2z"/>
                                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
                            </svg>
                            <span>Record Milk</span>
                        </a>
                        <a href="shop.html" class="quick-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="9" cy="21" r="1"/>
                                <circle cx="20" cy="21" r="1"/>
                                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                            </svg>
                            <span>New Sale</span>
                        </a>
                        <a href="finance.html" class="quick-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="1" x2="12" y2="23"/>
                                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                            </svg>
                            <span>Add Expense</span>
                        </a>
                        <a href="health.html" class="quick-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                            </svg>
                            <span>Health</span>
                        </a>
                        <a href="users.html" class="quick-action">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                                <circle cx="8.5" cy="7" r="4"/>
                                <line x1="20" y1="8" x2="20" y2="14"/>
                                <line x1="23" y1="11" x2="17" y2="11"/>
                            </svg>
                            <span>Add User</span>
                        </a>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>Recent Animals</h3>
                    <a href="animals.html" class="btn-link">View All</a>
                </div>
                <div class="card-body">
                    <ul id="recentAnimals" style="list-style: none;"></ul>
                </div>
            </div>
        </div>
    </main>

    <script src="storage-service.js"></script>
    <script>
        const user = DB.getCurrentUser();
        if (!user) location.href = 'index.html';
        if (!isAdmin()) location.href = 'worker.html';
        document.getElementById('userName').textContent = user.full_name;

        function loadDashboard() {
            const animals = DB.getAll('animals');
            const milk = DB.getAll('milk_production');
            const products = DB.getAll('products');
            const income = DB.getAll('income');

            document.getElementById('totalAnimals').textContent = animals.length;
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('totalIncome').textContent = 'UGX ' + income.reduce((a, b) => a + (b.amount || 0), 0).toLocaleString();

            const today = new Date().toISOString().split('T')[0];
            const todayMilk = milk.filter(m => m.recording_date === today).reduce((a, b) => a + (b.amount_liters || 0), 0);
            document.getElementById('milkToday').textContent = todayMilk.toFixed(1) + ' L';

            const recentList = document.getElementById('recentAnimals');
            if (animals.length === 0) {
                recentList.innerHTML = '<li style="text-align: center; color: #999; padding: 20px;">No animals registered yet</li>';
            } else {
                recentList.innerHTML = animals.slice(-5).reverse().map(a => `
                    <li style="padding: 12px 0; border-bottom: 1px solid #f3f4f6; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${a.tag_number || 'N/A'}</strong>
                            <span style="color: #666; font-size: 12px; margin-left: 10px;">${a.breed_name || ''} ${a.gender ? '- ' + a.gender : ''}</span>
                        </div>
                        <span style="color: #999; font-size: 12px;">${a.weight ? a.weight + ' kg' : ''}</span>
                    </li>
                `).join('');
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        loadDashboard();
    </script>
</body>
</html>
