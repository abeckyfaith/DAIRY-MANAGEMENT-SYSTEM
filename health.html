    </div>

  <circle cx="24" cy="30" r="6" fill="white"/>

</svg>
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">

            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>

            <a href="health.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>

            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Health Records</h1>
            <div class="topbar-right">
                <a href="dashboard.html" class="back-btn">← Back</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <div class="card-header">
                    <h3>Add Health Record</h3>
                </div>
                <div class="card-body">
                    <form id="healthForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Animal Tag *</label>
                                <select id="animalId" required><option value="">Select Animal</option></select>
                            </div>
                            <div class="form-group">
                                <label>Date *</label>
                                <input type="date" id="checkDate" required>
                            </div>
                            <div class="form-group">
                                <label>Type *</label>
                                <select id="healthType" required>
                                    <option value="">Select Type</option>
                                    <option value="General Checkup">General Checkup</option>
                                    <option value="Vaccination">Vaccination</option>
                                    <option value="Deworming">Deworming</option>
                                    <option value="Treatment">Treatment</option>
                                    <option value="Surgery">Surgery</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select id="healthStatus">
                                    <option value="Healthy">Healthy</option>
                                    <option value="Sick">Sick</option>
                                    <option value="Recovering">Recovering</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Diagnosis / Treatment</label>
                                <textarea id="diagnosis" rows="3" placeholder="Describe the diagnosis or treatment..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Temperature (°C)</label>
                                <input type="number" id="temperature" step="0.1" placeholder="e.g., 38.5">
                            </div>
                            <div class="form-group">
                                <label>Veterinarian</label>
                                <input type="text" id="veterinarian" placeholder="Dr. Name">
                            </div>
                        </div>
                        <div class="form-actions" style="margin-top: 24px;">
                            <button type="submit" class="btn btn-primary">Save Record</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card" style="margin-top: 24px;">
                <div class="card-header">
                    <h3>Recent Health Records</h3>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Diagnosis</th>
                                    <th>Vet</th>
                                </tr>
                            </thead>
                            <tbody id="healthTable">
                                <tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="storage-service.js"></script>
    <script>
        let currentUser = null;
        let allAnimals = [];

        auth.onAuthStateChanged(async function(user) {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = await DB.getUserData();
            await loadAnimals();
            await loadRecords();
        });

        async function loadAnimals() {
            allAnimals = await DB.getAllAnimals();
            const select = document.getElementById('animalId');
            select.innerHTML = '<option value="">Select Animal</option>';
            allAnimals.forEach(a => {
                const option = document.createElement('option');
                option.value = a.id;
                option.textContent = `${a.tag_number} - ${a.breed_name || 'Unknown'}`;
                select.appendChild(option);
            });
            document.getElementById('checkDate').valueAsDate = new Date();
        }

        async function loadRecords() {
            const records = await DB.getAllHealth();
            const tbody = document.getElementById('healthTable');
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">No health records</td></tr>';
            } else {
                tbody.innerHTML = records.reverse().slice(0, 20).map(r => `
                    <tr>
                        <td>${r.check_date || 'N/A'}</td>
                        <td><span class="badge">${r.health_type || 'N/A'}</span></td>
                        <td><span class="badge ${r.health_status === 'Healthy' ? 'badge-success' : 'badge-warning'}">${r.health_status || 'N/A'}</span></td>
                        <td>${r.diagnosis || '-'}</td>
                        <td>${r.veterinarian || '-'}</td>
                    </tr>
                `).join('');
            }
        }

        document.getElementById('healthForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const data = {
                animal_id: document.getElementById('animalId').value,
                check_date: document.getElementById('checkDate').value,
                health_type: document.getElementById('healthType').value,
                health_status: document.getElementById('healthStatus').value,
                diagnosis: document.getElementById('diagnosis').value,
                temperature: parseFloat(document.getElementById('temperature').value) || null,
                veterinarian: document.getElementById('veterinarian').value
            };
            await DB.createHealth(data);
            document.getElementById('healthForm').reset();
            document.getElementById('checkDate').valueAsDate = new Date();
            loadRecords();
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
</body>
