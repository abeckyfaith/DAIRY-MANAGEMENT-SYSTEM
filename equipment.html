<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

        <svg class="bg-cow bg-cow-2" viewBox="0 0 200 200" fill="#667eea"><ellipse cx="100" cy="110" rx="60" ry="50"/><ellipse cx="40" cy="70" rx="20" ry="12" transform="rotate(-30 40 70)"/><ellipse cx="160" cy="70" rx="20" ry="12" transform="rotate(30 160 70)"/><path d="M50 60 Q35 25 55 40" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"/><path d="M150 60 Q165 25 145 40" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"/><circle cx="75" cy="95" r="12" fill="rgba(118,75,162,0.5)"/><circle cx="130" cy="115" r="8" fill="rgba(118,75,162,0.5)"/><circle cx="80" cy="90" r="8" fill="#fff"/><circle cx="130" cy="90" r="8" fill="#fff"/><circle cx="82" cy="92" r="4" fill="#333"/><circle cx="132" cy="92" r="4" fill="#333"/><ellipse cx="100" cy="130" rx="24" ry="16" fill="#f8b4d9"/><circle cx="92" cy="130" r="4" fill="#667eea"/><circle cx="108" cy="130" r="4" fill="#667eea"/></svg>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close" onclick="closeSidebar()">×</button>
        <div class="sidebar-header">
            <img src="animal.png" alt="Logo" style="width:40px;height:40px;object-fit:contain;">
            <h3>Dairy MS</h3>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
            <a href="animals.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2c-4 0-8 2-8 8 0 4 3 8 8 12 5-4 8-8 8-12 0-6-4-8-8-8z"/></svg>Animals</a>
            <a href="milk.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2h8l4 10H4L8 2z"/><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>Milk Records</a>
            <a href="health.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>Health</a>
            <a href="shop.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/></svg>Dairy Shop</a>
            <a href="finance.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finance</a>
            <a href="feed.html" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5"/></svg>Feed</a>
            <a href="equipment.html" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>Equipment</a>
            <a href="index.html" class="nav-item" onclick="handleLogout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1>Equipment</h1>
            <div class="topbar-right">
                <a href="dashboard.html" class="back-btn">← Back</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card">
                <div class="card-header">
                    <h3>Add Equipment</h3>
                </div>
                <div class="card-body">
                    <form id="equipmentForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Equipment Name *</label>
                                <input type="text" id="equipmentName" required placeholder="e.g., Milking Machine, Feed Mixer">
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select id="category">
                                    <option value="Milking">Milking</option>
                                    <option value="Feeding">Feeding</option>
                                    <option value="Cleaning">Cleaning</option>
                                    <option value="Transportation">Transportation</option>
                                    <option value="Storage">Storage</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Quantity</label>
                                <input type="number" id="quantity" value="1">
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select id="status">
                                    <option value="Operational">Operational</option>
                                    <option value="Under Maintenance">Under Maintenance</option>
                                    <option value="Out of Service">Out of Service</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>Notes</label>
                                <textarea id="notes" rows="2" placeholder="Additional information..."></textarea>
                            </div>
                        </div>
                        <div class="form-actions" style="margin-top: 24px;">
                            <button type="submit" class="btn btn-primary">Add Equipment</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card" style="margin-top: 24px;">
                <div class="card-header"><h3>Equipment List</h3></div>
                <div class="card-body">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>Name</th><th>Category</th><th>Quantity</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="equipmentTable">
                                <tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="storage-service.js"></script>
    <script>
        function loadEquipment() {
            const items = DB.getAll('equipment');
            const tbody = document.getElementById('equipmentTable');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px; color: #999;">No equipment registered</td></tr>';
            } else {
                tbody.innerHTML = items.map(e => `
                    <tr>
                        <td><strong>${e.name || 'N/A'}</strong></td>
                        <td>${e.category || '-'}</td>
                        <td>${e.quantity || 1}</td>
                        <td><span class="badge ${e.status === 'Operational' ? 'badge-success' : 'badge-warning'}">${e.status || 'N/A'}</span></td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="editEquipment('${e.id}')">Edit</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        function editEquipment(id) {
            const items = DB.getAll('equipment');
            const item = items.find(x => x.id === id);
            if (item) {
                const status = prompt('Update status:', item.status);
                if (status) {
                    DB.update('equipment', id, { status });
                    loadEquipment();
                }
            }
        }

        document.getElementById('equipmentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('equipmentName').value,
                category: document.getElementById('category').value,
                quantity: parseInt(document.getElementById('quantity').value) || 1,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            DB.create('equipment', data);
            document.getElementById('equipmentForm').reset();
            document.getElementById('quantity').value = '1';
            loadEquipment();
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); }
        loadEquipment();
    </script>
    <button class="scroll-top" id="scrollTop" onclick="scrollToTop()">↑</button>
    <script>window.onscroll = function() { document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300); }; function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }</script>
</body>
</html>
