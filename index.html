<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dairy Management System</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- Custom Styles -->
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo svg {
            width: 60px;
            height: 60px;
        }
        .logo h1 {
            font-size: 24px;
            color: #333;
            margin-top: 10px;
        }
        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .error {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .success {
            background: #efe;
            color: #060;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success.show {
            display: block;
        }
        .toggle {
            text-align: center;
            margin-top: 20px;
        }
        .toggle a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }
        .toggle a:hover {
            text-decoration: underline;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="login-container" id="loginForm">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h1>Dairy Management</h1>
            <p>Sign in to continue</p>
        </div>
        
        <div class="error" id="loginError"></div>
        
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>
        
        <div class="toggle">
            <p>Don't have an account? <a onclick="showRegister()">Register here</a></p>
        </div>
    </div>

    <!-- Register Form -->
    <div class="login-container" id="registerForm" style="display: none;">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
            <h1>Create Account</h1>
            <p>Register for Dairy Management</p>
        </div>
        
        <div class="error" id="registerError"></div>
        <div class="success" id="registerSuccess">Registration successful! Redirecting...</div>
        
        <form onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regFullName" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="regPhone" placeholder="Enter phone number">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select id="regRole">
                    <option value="Owner">Owner</option>
                    <option value="Veterinarian">Veterinarian</option>
                    <option value="Worker">Worker</option>
                    <option value="Staff">Staff</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required placeholder="Create a password" minlength="6">
            </div>
            <button type="submit" class="btn" id="registerBtn">Create Account</button>
        </form>
        
        <div class="toggle">
            <p>Already have an account? <a onclick="showLogin()">Sign in</a></p>
        </div>
    </div>

    <!-- Loading -->
    <div class="login-container" id="loadingScreen" style="display: none;">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Firebase Service -->
    <script src="../firebase-service.js"></script>
    
    <script>
        // Check if already logged in
        AuthService.onAuthStateChange(user => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('registerError').classList.remove('show');
            document.getElementById('registerSuccess').classList.remove('show');
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginError').classList.remove('show');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('loginError');

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            error.classList.remove('show');

            const result = await AuthService.login(email, password);

            if (result.success) {
                window.location.href = 'dashboard.html';
            } else {
                error.textContent = result.error;
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const userData = {
                username: document.getElementById('regEmail').value.split('@')[0],
                full_name: document.getElementById('regFullName').value,
                phone: document.getElementById('regPhone').value,
                role: document.getElementById('regRole').value
            };
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const btn = document.getElementById('registerBtn');
            const error = document.getElementById('registerError');
            const success = document.getElementById('registerSuccess');

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            error.classList.remove('show');
            success.classList.remove('show');

            const result = await AuthService.register(email, password, userData);

            if (result.success) {
                success.classList.add('show');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                error.textContent = result.error;
                error.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
